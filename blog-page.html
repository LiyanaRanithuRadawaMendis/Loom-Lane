<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loom & Lane | Article</title>
    <link rel="icon" type="image/x-icon" href="assets/icons/logo2.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body data-theme="light">

    <header class="site-header sticky-top">
        <div class="container px-4 d-flex justify-content-between align-items-center">
            <div class="logo-area"><a href="index.html" class="logo-text">Loom & Lane</a></div>
            <nav class="nav-pill-container d-none d-xl-block">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="sales.html">Sales</a></li>
                    <li><a href="blog.html" class="active">Blog</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>
            </nav>
            <div class="header-icons d-flex gap-3 align-items-center">
                <div class="search-wrapper position-relative">
                    <input type="checkbox" id="search-toggle" class="d-none">
                    <input type="text" id="search-input" class="search-input" placeholder="Search products...">
                    <label for="search-toggle" class="icon-circle search-label">
                        <img src="assets/icons/header-icons/search.svg" alt="Search">
                    </label>
                    <div id="search-results" class="search-dropdown-box d-none"></div>
                </div>
                <button class="icon-circle theme-toggle border-0" id="theme-btn">
                    <img src="assets/icons/header-icons/light_mode.svg" alt="Light" class="mode-icon sun-icon">
                    <img src="assets/icons/header-icons/dark_mode.svg" alt="Dark" class="mode-icon moon-icon d-none">
                </button>
                <a href="watchlist.html" class="icon-circle d-none d-sm-flex"><img src="assets/icons/header-icons/favorite.svg" alt="Wishlist"></a>
                <a href="cart.html" class="icon-circle position-relative">
                    <img src="assets/icons/header-icons/shopping_cart.svg" alt="Cart">
                    <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.7rem; display: none;">
                        0
                    </span>
                </a>
                <a href="account.html" class="icon-circle d-none d-sm-flex"><img src="assets/icons/header-icons/account.svg" alt="Account"></a>
                <button class="icon-circle mobile-toggle d-xl-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileMenu"><img src="assets/icons/header-icons/menu.svg" alt="Menu" style="width: 20px;"></button>
            </div>
        </div>
    </header>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="blog.html" class="text-decoration-none text-muted">Blog</a></li>
                        <li class="breadcrumb-item active" aria-current="page" id="breadcrumb-title">Loading...</li>
                    </ol>
                </nav>
                
                <div class="text-center mb-5">
                    <span class="badge bg-teal-solid text-uppercase ls-1 mb-3" id="article-category">Category</span>
                    <h1 class="display-4 fw-bold mb-3" style="color: #1C4E55;" id="article-title">Loading Article...</h1>
                    <p class="text-muted" id="article-date">...</p>
                </div>

                <div class="mb-5 rounded-4 overflow-hidden shadow-sm">
                    <img id="article-image" src="" alt="Blog Cover" style="width: 100%; height: auto; max-height: 500px; object-fit: cover;">
                </div>
            </div>
        </div>
    </div>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="article-body" id="article-content" style="font-size: 1.1rem; line-height: 1.8; color: #4a4a4a;">
                    </div>
                
                <hr class="my-5">
                
                <div class="d-flex gap-2 align-items-center">
                    <span class="text-muted small">Share:</span>
                    
                    <a href="#" class="text-decoration-none">
                        <img src="assets/images/share/Facebook.png" alt="Facebook" width="24" height="24">
                    </a>
                    
                    <a href="#" class="text-decoration-none">
                        <img src="assets/images/share/x.svg" alt="X" width="24" height="24">
                    </a>
                    
                    <a href="#" class="text-decoration-none">
                        <img src="assets/images/share/Instagram.svg" alt="Instagram" width="24" height="24">
                    </a>
                </div>
            </div>
        </div>
    </div>

    <footer class="container-fluid p-0 mt-5">
        <div class="footer-box">
            <p class="text-center small text-muted mb-0">&copy; 2025 Loom & Lane. RM All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="data/blog.js"></script>
    <script src="data/products.js"></script>
    <script src="js/chatbot.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
